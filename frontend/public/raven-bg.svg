<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="45%" stop-color="#243b55"/>
      <stop offset="100%" stop-color="#141e30"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#5b8def" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b8def" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#3ecfba" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3ecfba" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#7c6cf0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c6cf0" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>
  <rect width="1920" height="1080" filter="url(#noise)" opacity="0.5"/>
</svg>
